<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            background-color: #fff;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        #taskInput {
            padding: 8px;
            width: 70%;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        #addButton {
            padding: 8px 15px;
            margin-left: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        #addButton:hover {
            background-color: #45a049;
        }

        #todoList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #todoList li {
            padding: 12px;
            margin: 8px 0;
            background: #f5f5f5;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        #todoList li:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        #todoList li.done {
            text-decoration: line-through;
            color: #888;
            background: #e0e0e0;
            opacity: 0.7;
        }

        #todoList li.done span {
            text-decoration: line-through;
        }

        #todoList li button {
            margin-left: 10px;
            padding: 5px 10px;
            cursor: pointer;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        #todoList li button:first-of-type {
            background-color: #2196F3;
            color: white;
        }

        #todoList li button:first-of-type:hover {
            background-color: #0b7dda;
        }

        #todoList li button:last-of-type {
            background-color: #f44336;
            color: white;
        }

        #todoList li button:last-of-type:hover {
            background-color: #da190b;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>
    <h1>📋 Мой To-Do List</h1>
    
    <input type="text" id="taskInput" placeholder="Введите задачу...">
    <button id="addButton">Добавить</button>
    
    <ul id="todoList"></ul>
    
    <script src="todolist.js"></script>
</body>
</html>
