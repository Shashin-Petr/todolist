<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        h1 { color: #333; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; margin: 5px 0; background: #f5f5f5; border-radius: 5px; }
        .done { text-decoration: line-through; color: #888; background: #e0e0e0; }
        button { margin-left: 10px; padding: 5px 10px; cursor: pointer; }
        input { padding: 8px; width: 70%; }
    </style>
</head>
<body>
    <h1>📋 Мой To-Do List</h1>
    
    <input type="text" id="taskInput" placeholder="Введите задачу...">
    <button onclick="addFromInput()">Добавить</button>
    
    <ul id="todoList"></ul>
    
    <script>
        let toDoList = [];
        
        function addToDo(task) {
            if (!task || task.trim() === "") return;
            
            toDoList.push({
                text: task,
                isDone: false
            });
            renderList();
        }
        
        function toggleToDo(index) {
            if(index >= 0 && index < toDoList.length) {
                toDoList[index].isDone = !toDoList[index].isDone;
                renderList();
            }
        }
        
        function deleteToDo(index) {
            if(index >= 0 && index < toDoList.length) {
                toDoList.splice(index, 1);
                renderList();
            }
        }
        
        function addFromInput() {
            let input = document.getElementById('taskInput');
            addToDo(input.value);
            input.value = '';
        }
        
        function renderList() {
            let list = document.getElementById('todoList');
            list.innerHTML = '';
            
            toDoList.forEach((task, index) => {
                let li = document.createElement('li');
                li.className = task.isDone ? 'done' : '';
                li.innerHTML = `
                    <span>${task.text}</span>
                    <button onclick="toggleToDo(${index})">${task.isDone ? '↩' : '✓'}</button>
                    <button onclick="deleteToDo(${index})">🗑</button>
                `;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
